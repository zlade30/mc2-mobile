name: iOS Release

on:
  push:
    tags:
      - "v*.*.*"
    branches:
      - ci-ios-test
  workflow_dispatch:

jobs:
  build:
    # Xcode 26 + iOS 26 SDK (ITMS-90725: required for uploads after 2026-04-28)
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pin a 26.x release so archives use iOS 26 SDK, not an older co-installed Xcode
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.4"

      # Xcode 26 on hosted runners: exit 70 + "Found no destinations" / wrong SDK if CLI default
      # still points at another Xcode or the iOS platform bundle is incomplete. Align xcode-select with
      # the chosen Xcode and ensure the iOS platform is present before CocoaPods / xcodebuild.
      # setup-xcode does not always export DEVELOPER_DIR on macos-26; MD_APPLE_SDK_ROOT is set by the image.
      - name: Activate Xcode CLI and iOS platform
        run: |
          set -euo pipefail
          RESOLVED="${DEVELOPER_DIR:-}"
          if [ -z "$RESOLVED" ] && [ -n "${MD_APPLE_SDK_ROOT:-}" ]; then
            CANDIDATE="${MD_APPLE_SDK_ROOT}/Contents/Developer"
            if [ -d "$CANDIDATE" ]; then
              RESOLVED="$CANDIDATE"
            fi
          fi
          if [ -z "$RESOLVED" ]; then
            ACTIVE="$(xcode-select -p 2>/dev/null || true)"
            if [ -n "$ACTIVE" ] && [ -d "$ACTIVE" ]; then
              RESOLVED="$ACTIVE"
            fi
          fi
          if [ -z "$RESOLVED" ]; then
            echo "Could not resolve Xcode developer dir (DEVELOPER_DIR unset, MD_APPLE_SDK_ROOT/Contents/Developer missing, xcode-select -p invalid)"
            exit 1
          fi
          echo "Using DEVELOPER_DIR=$RESOLVED"
          sudo xcode-select -s "$RESOLVED"
          xcodebuild -version
          xcodebuild -downloadPlatform iOS

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Install JS dependencies
        run: npm ci

      - name: Write Google Services plist
        run: echo '${{ secrets.GOOGLE_SERVICES_PLIST }}' > GoogleService-Info.plist

      - name: Prebuild iOS
        env:
          EXPO_APP_PACKAGE_NAME: ${{ secrets.IOS_BUNDLE_ID }}
          # Optional; if unset, app.json ios.appleTeamId is used (required for Xcode DEVELOPMENT_TEAM)
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          EXPO_PUBLIC_SENTRY_AUTH_TOKEN: ${{ secrets.EXPO_PUBLIC_SENTRY_AUTH_TOKEN }}
          EXPO_PUBLIC_SENTRY_ORGANIZATION: ${{ secrets.EXPO_PUBLIC_SENTRY_ORGANIZATION }}
          EXPO_PUBLIC_SENTRY_PROJECT: ${{ secrets.EXPO_PUBLIC_SENTRY_PROJECT }}
          EXPO_PUBLIC_GOOGLE_SERVICES_FILE: ./GoogleService-Info.plist
          NODE_ENV: production
        run: node scripts/bump-version.js && NODE_ENV=production npx expo prebuild --clean --platform ios

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      # Clone match certs over HTTPS without Basic header (avoids GitHub HTTP 400 from bad base64).
      # Add repo secret MATCH_GITHUB_PAT = classic PAT with "repo" scope (raw ghp_… only, no base64).
      - name: Configure Git for match (private certs repo)
        run: |
          git config --global url."https://x-access-token:${MATCH_GITHUB_PAT}@github.com/".insteadOf "https://github.com/"
        env:
          MATCH_GITHUB_PAT: ${{ secrets.MATCH_GITHUB_PAT }}

      - name: Run Fastlane
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          IOS_BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          # Optional: fixed password for temp keychain. If unset, Fastlane generates one per run.
          MATCH_KEYCHAIN_PASSWORD: ${{ secrets.MATCH_KEYCHAIN_PASSWORD }}
        run: bundle exec fastlane ios beta
